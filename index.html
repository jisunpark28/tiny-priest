<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Priest - Welcome to Our Church</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/church.png">
</head>
<body>
    <div id="entry-screen" class="main-container">
        <h1 class="main-title">Welcome to Tiny Church.</h1>

        <div id="church-scene" class="church-scene">
            <div class="church-building" aria-hidden="true">
                <img src="assets/church.png" alt="">
            </div>

            <div class="asset statue-mary">
                <img src="assets/mary.png" alt="Statue of Virgin Mary">
            </div>

            <div class="character-group">
                <div
                    id="character-priest"
                    class="asset character character-priest"
                    data-character="priest"
                    onclick="handleInteract('priest')"
                >
                    <img src="assets/priest_front.png" alt="Father Priest">
                </div>
                <div
                    id="character-nun"
                    class="asset character character-nun"
                    data-character="nun"
                    onclick="handleInteract('nun')"
                >
                    <img src="assets/nun_front.png" alt="Sister Nun">
                </div>
            </div>
        </div>

        <div id="dialogue-box" class="dialogue-box">
            Click the characters to say hello!
        </div>
    </div>

    <div id="entry-flash" class="entry-flash" aria-hidden="true"></div>
    <div id="three-container" class="three-container" aria-hidden="true"></div>
    <aside id="mass-navigator" class="mass-navigator" aria-hidden="true">
        <div class="mass-nav-title">🕊️ Mass Order Navigator</div>
        <div id="mass-nav-groups" class="mass-nav-groups"></div>
    </aside>

    <section id="liturgy-hud" class="liturgy-hud" aria-hidden="true">
        <div id="liturgy-subtitle" class="liturgy-subtitle">
            🎵 The Mass guide subtitle will appear here.
        </div>
        <div class="liturgy-controls">
            <button type="button" class="control-btn" data-command="gesture-idle" data-gesture="idle"><span>🙂</span><span class="control-label">Idle</span></button>
            <button type="button" class="control-btn" data-command="gesture-point" data-gesture="point"><span>👉</span><span class="control-label">Point</span></button>
            <button type="button" class="control-btn" data-command="gesture-hold" data-gesture="hold"><span>📖</span><span class="control-label">Hold Gift</span></button>
            <button type="button" class="control-btn" data-command="gesture-lift" data-gesture="lift"><span>🙌</span><span class="control-label">Lift Gift</span></button>
            <button type="button" class="control-btn" data-command="gesture-pray" data-gesture="pray"><span>🙏</span><span class="control-label">Pray</span></button>
            <button type="button" class="control-btn" data-command="gesture-ourfather" data-gesture="ourFather"><span>👐</span><span class="control-label">Our Father</span></button>
            <button type="button" class="control-btn" data-command="gesture-signcross" data-gesture="signCross"><span>✝️</span><span class="control-label">Sign of Cross</span></button>
            <button type="button" class="control-btn" data-command="mass-toggle"><span>🎬</span><span class="control-label">Start Mass</span></button>
            <button type="button" class="control-btn" data-command="move-left"><span>⬅️</span><span class="control-label">Left</span></button>
            <button type="button" class="control-btn" data-command="move-forward"><span>⬆️</span><span class="control-label">Forward</span></button>
            <button type="button" class="control-btn" data-command="move-back"><span>⬇️</span><span class="control-label">Back</span></button>
            <button type="button" class="control-btn" data-command="move-right"><span>➡️</span><span class="control-label">Right</span></button>
            <button type="button" class="control-btn" data-command="jump"><span>⤴️</span><span class="control-label">Jump</span></button>
        </div>
        <p class="liturgy-help">
            ⌨️ Keyboard: Arrows/WASD move · Space jump · 1~7 gestures · M Mass sequence
        </p>
    </section>

    <script src="vendor/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
